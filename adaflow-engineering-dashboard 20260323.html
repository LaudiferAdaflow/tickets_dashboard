<title>Adaflow — Dashboard de Engenharia · Março 2026</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f4f0;
  --bg-tertiary: #eeecea;
  --text-primary: #2c2c2a;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --border: rgba(0,0,0,0.12);
  --border-md: rgba(0,0,0,0.20);
  --radius-md: 8px;
  --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1c;
    --bg-secondary: #2a2a28;
    --bg-tertiary: #333330;
    --text-primary: #e8e6de;
    --text-secondary: #b4b2a9;
    --text-tertiary: #888780;
    --border: rgba(255,255,255,0.10);
    --border-md: rgba(255,255,255,0.18);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);padding:24px 16px;min-height:100vh}
.container{max-width:900px;margin:0 auto}
.header{margin-bottom:24px}
.header h1{font-size:20px;font-weight:500;color:var(--text-primary)}
.header p{font-size:13px;color:var(--text-secondary);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border);padding-bottom:0}
.tab-btn{padding:8px 16px;font-size:13px;font-weight:500;border:none;background:none;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s;font-family:var(--font)}
.tab-btn.active{color:var(--text-primary);border-bottom:2px solid #185FA5}
.tab-btn:hover:not(.active){color:var(--text-primary)}
.tab-pane{display:none}.tab-pane.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.kpi-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.kpi-grid-2{grid-template-columns:1fr}}
.kpi{background:var(--bg-secondary);border-radius:var(--radius-md);padding:0.875rem 1rem}
.kpi-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:500;line-height:1.2}
.kpi-sub{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.section-title{font-size:11px;font-weight:500;color:var(--text-secondary);margin:1.25rem 0 0.75rem;text-transform:uppercase;letter-spacing:0.06em}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1rem}
@media(max-width:600px){.chart-row{grid-template-columns:1fr}}
.chart-box{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.chart-box-full{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1rem}
.chart-title{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:0.75rem}
.mini-table{width:100%;font-size:11px;border-collapse:collapse;margin-top:10px;border-top:0.5px solid var(--border);padding-top:0}
.mini-table td{padding:4px 4px;color:var(--text-secondary)}
.mini-table tr:first-child td{font-weight:500;padding-top:10px}
.mini-table td:last-child{text-align:right;font-weight:500;color:var(--text-primary)}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:var(--text-secondary)}
.legend span{display:flex;align-items:center;gap:4px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.alert{border-radius:var(--radius-md);padding:10px 14px;font-size:12px;margin-bottom:1rem;display:flex;gap:8px;align-items:flex-start}
.alert-red{background:#FCEBEB;color:#791F1F;border:0.5px solid #F7C1C1}
.alert-yellow{background:#FAEEDA;color:#633806;border:0.5px solid #FAC775}
.alert-blue{background:#E6F1FB;color:#0C447C;border:0.5px solid #B5D4F4}
@media(prefers-color-scheme:dark){
  .alert-red{background:#3a1010;color:#F09595;border-color:#791F1F}
  .alert-yellow{background:#2e1f00;color:#EF9F27;border-color:#854F0B}
  .alert-blue{background:#042C53;color:#85B7EB;border-color:#185FA5}
}
.highlights{background:var(--bg-secondary);border-radius:var(--radius-md);padding:1rem;margin-top:1rem}
.hl-title{font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.hl-item{font-size:12px;color:var(--text-secondary);padding:4px 0;border-bottom:0.5px solid var(--border)}
.hl-item:last-child{border-bottom:none}
.hl-item b{color:var(--text-primary);font-weight:500}
.pending-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:0.5rem}
.pending-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text-secondary);padding:6px 8px;border-bottom:0.5px solid var(--border)}
.pending-table td{padding:6px 8px;border-bottom:0.5px solid var(--border);color:var(--text-primary);vertical-align:top}
.pending-table tr:last-child td{border-bottom:none}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:var(--radius-md);white-space:nowrap}
.tag-done{background:#E1F5EE;color:#085041}
.tag-acoes{background:#EAF3DE;color:#27500A}
.tag-inprog{background:#E6F1FB;color:#0C447C}
.tag-triaged{background:#FAEEDA;color:#633806}
.tag-todo,.tag-open{background:#F1EFE8;color:#444441}
.tag-blocked{background:#FCEBEB;color:#791F1F}
.tag-backlog{background:#FBEAF0;color:#72243E}
.tag-bug{background:#FCEBEB;color:#791F1F}
.tag-melhoria{background:#E6F1FB;color:#0C447C}
.tag-suporte{background:#E1F5EE;color:#085041}
.tag-duvida{background:#FAEEDA;color:#633806}
.var-pos{color:#1D9E75;font-weight:500}
.var-neg{color:#A32D2D;font-weight:500}
.overflow-x{overflow-x:auto}
.generated{font-size:11px;color:var(--text-tertiary);text-align:right;margin-top:24px}
</style>
</head>

function parseDate(s){ return new Date(s+'T00:00:00'); }
const hoje = new Date('2026-03-30');
const diaSem = hoje.getDay();
const diasAteLast = diaSem === 0 ? 0 : diaSem;
const semFim = new Date(hoje); semFim.setDate(hoje.getDate() - diasAteLast);
const semIni = new Date(semFim); semIni.setDate(semFim.getDate() - 6);
const mesIni = new Date(2026,2,1);
const mesFim = new Date(2026,2,31);
const mesAntIni = new Date(2026,1,1);
const mesAntFim = new Date(2026,1,28);
function inRange(t,s,e){ const d=parseDate(t.Criação); return d>=s && d<=e; }
const semTx = tickets.filter(t=>inRange(t,semIni,semFim));
const mesTx = tickets.filter(t=>inRange(t,mesIni,mesFim));
const mesAntTx = tickets.filter(t=>inRange(t,mesAntIni,mesAntFim));
const allOpen = tickets.filter(t=>ABERTO(t.Status));
function groupBy(arr,key){ const m={}; arr.forEach(t=>{ const v=t[key]||'–'; m[v]=(m[v]||0)+1; }); return m; }
function topN(obj,n){ return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n); }
function tagStatus(s){
  const m={'Done':'tag-done','Ações Concluídas':'tag-acoes','In-progress':'tag-inprog','Triaged':'tag-triaged','To Do':'tag-todo','Open':'tag-open','Blocked':'tag-blocked','Backlog p/ Pitchs':'tag-backlog'};
  return `<span class="tag ${m[s]||'tag-open'}">${s}</span>`;
}
function tagTipo(s){
  const m={'Bug':'tag-bug','Melhoria':'tag-melhoria','Solicitação de Suporte':'tag-suporte','Dúvida Interna':'tag-duvida'};
  return `<span class="tag ${m[s]||'tag-open'}">${s||'–'}</span>`;
}
function makeHbar(canvasId,labels,data,colors,wrapH){
  return `<div style="position:relative;width:100%;height:${wrapH}px"><canvas id="${canvasId}"></canvas></div>`;
}
function initHbar(canvasId,labels,data,colors){
  const maxV = Math.max(...data,1);
  new Chart(document.getElementById(canvasId),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:3,borderSkipped:false}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      layout:{padding:{right:36}},
      scales:{x:{display:false,max:maxV*1.25,grid:{display:false}},y:{ticks:{font:{size:11},color:labelC},grid:{display:false}}},
      plugins:{legend:{display:false},datalabels:{anchor:'end',align:'end',color:textC,font:{size:11,weight:'500'},formatter:v=>v>0?v:'',padding:{left:4}}}
    }
  });
}
function makeDonut(canvasId){
  return `<div style="position:relative;width:100%;height:180px"><canvas id="${canvasId}"></canvas></div>`;
}
function initDonut(canvasId,labels,data,colors){
  new Chart(document.getElementById(canvasId),{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:1,borderColor:'transparent'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},datalabels:{display:false}}}
  });

function legendHtml(labels,data,colors){
  return `<div class="legend">${labels.map((l,i)=>`<span><span class="legend-dot" style="background:${colors[i%colors.length]}"></span>${l} (${data[i]})</span>`).join('')}</div>`;
}
function miniTable(headers,rows){
  return `<table class="mini-table"><tr>${headers.map(h=>`<td>${h}</td>`).join('')}</tr>${rows.map(r=>`<tr>${r.map((c,i)=>`<td>${c}</td>`).join('')}</tr>`).join('')}</table>`;
}
const totalPlugin={id:'totals',afterDatasetsDraw(chart){
  const{ctx,data}=chart;
  const totals=chart.data.labels.map((_,i)=>data.datasets.reduce((a,d)=>a+(d.data[i]||0),0));
  const meta=chart.getDatasetMeta(data.datasets.length-1);
  ctx.save();
  meta.data.forEach((bar,i)=>{
    if(totals[i]>0){
      ctx.fillStyle=textC;ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(totals[i],bar.x,bar.y-6);
    }
  });
  ctx.restore();
}};

function switchTab(id,btn){

  document.getElementById(id).classList.add('active');

}
